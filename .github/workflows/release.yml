name: Release

permissions:
  contents: write

on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'

# https://github.com/PRO-2684/castwright/blob/main/.github/workflows/release.yml

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        platform:
        - os: ubuntu-latest
          ext: ""
        - os: windows-latest
          ext: ".exe"
    runs-on: ${{ matrix.platform.os }}
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Build executables
      run: cargo build --release --bin mtorrent-cli --bin dht_node --bin prettyprint
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binaries-${{ matrix.platform.os }}
        path: |
          target/release/mtorrent-cli${{ matrix.platform.ext }}
          target/release/dht_node${{ matrix.platform.ext }}
          target/release/prettyprint${{ matrix.platform.ext }}

  create-release:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        merge-multiple: true
    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: artifacts/*

  publish-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
    - name: Log in to crates.io
      run: |-
        echo "${{ secrets.CARGO_TOKEN }}" | cargo login
    - name: Publish to crates.io
      run: cargo publish --workspace
